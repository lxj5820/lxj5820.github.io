<script>
  var message_Path = 'https://cdn.jsdelivr.net/gh/hsxyhao/live2d.github.io@master/';
  let landlord = document.querySelector('#landlord');
  var apiKey = landlord.dataset.key;
</script>
<script type="text/javascript" src="/media/live2d/js/live2d.js"></script>
<script>
	var home_Path = document.location.protocol + '//' + window.document.location.hostname + ":" + window.document.location.port + '/';
	var userAgent = window.navigator.userAgent.toLowerCase();
	var norunAI = ["android", "iphone", "ipod", "ipad", "windows phone", "mqqbrowser", "msie", "trident/7.0"];
	var norunFlag = false;

	for (var i = 0; i < norunAI.length; i++) {
		if (userAgent.indexOf(norunAI[i]) > -1) {
			norunFlag = true;
			break;
		}
	}

	if (!window.WebGLRenderingContext) {
		norunFlag = true;
	}

	if (!norunFlag) {
		var hitFlag = false;
		var AIFadeFlag = false;
		var liveTlakTimer = null;
		var sleepTimer_ = null;
		var AITalkFlag = false;
		var talkNum = 0;
		(function () {
			function renderTip(template, context) {
				var tokenReg = /(\\)?\{([^\{\}\\]+)(\\)?\}/g;
				return template.replace(tokenReg, function (word, slash1, token, slash2) {
					if (slash1 || slash2) {
						return word.replace('\\', '');
					}
					var variables = token.replace(/\s/g, '').split('.');
					var currentObject = context;
					var i, length, variable;
					for (i = 0, length = variables.length; i < length; ++i) {
						variable = variables[i];
						currentObject = currentObject[variable];
						if (currentObject === undefined || currentObject === null) return '';
					}
					return currentObject;
				});
			}

			String.prototype.renderTip = function (context) {
				return renderTip(this, context);
			};

			var re = /x/;
			re.toString = function () {
				showMessage('哈哈，你打开了控制台，是想要看看我的秘密吗？', 5000);
				return '';
			};

			$(document).on('copy', function () {
				showMessage('你都复制了些什么呀，转载要记得加上出处哦~~', 5000);
			});

			function initTips() {
				$.ajax({
					cache: true,
					url: message_Path + 'message.json',
					dataType: "json",
					success: function (result) {
						$.each(result.mouseover, function (index, tips) {
							$(tips.selector).mouseover(function () {
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
								talkValTimer();
								clearInterval(liveTlakTimer);
								liveTlakTimer = null;
							});
							$(tips.selector).mouseout(function () {
								showHitokoto();
								if (liveTlakTimer == null) {
									liveTlakTimer = window.setInterval(function () {
										showHitokoto();
									}, 15000);
								};
							});
						});
						$.each(result.click, function (index, tips) {
							$(tips.selector).click(function () {
								if (hitFlag) {
									return false
								}
								hitFlag = true;
								setTimeout(function () {
									hitFlag = false;
								}, 8000);
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
							});
							clearInterval(liveTlakTimer);
							liveTlakTimer = null;
							if (liveTlakTimer == null) {
								liveTlakTimer = window.setInterval(function () {
									showHitokoto();
								}, 15000);
							};
						});
					}
				});
			}
			initTips();

			var text;
			if (document.referrer !== '') {
				var referrer = document.createElement('a');
				referrer.href = document.referrer;
				text = '嗨！来自 <span style="color:#0099cc;">' + referrer.hostname + '</span> 的朋友！';
				var domain = referrer.hostname.split('.')[1];
				if (domain == 'baidu') {
					text = '嗨！ 来自 百度搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'so') {
					text = '嗨！ 来自 360搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'google') {
					text = '嗨！ 来自 谷歌搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			} else {
				if (window.location.href == home_Path) { //主页URL判断，需要斜杠结尾
					var now = (new Date()).getHours();
					if (now > 23 || now <= 5) {
						text = '你是夜猫子呀？这么晚还不睡觉，明天起的来嘛？';
					} else if (now > 5 && now <= 7) {
						text = '早上好！一日之计在于晨，美好的一天就要开始了！';
					} else if (now > 7 && now <= 11) {
						text = '上午好！工作顺利嘛，不要久坐，多起来走动走动哦！';
					} else if (now > 11 && now <= 14) {
						text = '中午了，工作了一个上午，现在是午餐时间！';
					} else if (now > 14 && now <= 17) {
						text = '午后很容易犯困呢，今天的运动目标完成了吗？';
					} else if (now > 17 && now <= 19) {
						text = '傍晚了！窗外夕阳的景色很美丽呢，最美不过夕阳红~~';
					} else if (now > 19 && now <= 21) {
						text = '晚上好，今天过得怎么样？';
					} else if (now > 21 && now <= 23) {
						text = '已经这么晚了呀，早点休息吧，晚安~~';
					} else {
						text = '嗨~ 快来逗我玩吧！';
					}
				} else {
					text = '欢迎阅读<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			}
			showMessage(text, 12000);
		})();

		liveTlakTimer = setInterval(function () {
			showHitokoto();
		}, 15000);

		function showHitokoto() {
			if (sessionStorage.getItem("Sleepy") !== "1") {
				if (!AITalkFlag) {
					$.getJSON('https://v1.hitokoto.cn/', function (result) {
						talkValTimer();
						showMessage(result.hitokoto, 0);
					});
				}
			} else {
				hideMessage(0);
				if (sleepTimer_ == null) {
					sleepTimer_ = setInterval(function () {
						checkSleep();
					}, 200);
				}
			}
		}

		function checkSleep() {
			var sleepStatu = sessionStorage.getItem("Sleepy");
			if (sleepStatu !== '1') {
				talkValTimer();
				showMessage('你回来啦~', 0);
				clearInterval(sleepTimer_);
				sleepTimer_ = null;
			}
		}

		function showMessage(text, timeout) {
			if (Array.isArray(text)) text = text[Math.floor(Math.random() * text.length + 1) - 1];
			$('.message').stop();
			$('.message').html(text);
			$('.message').fadeTo(200, 1);
			//if (timeout === null) timeout = 5000;
			//hideMessage(timeout);
		}
		function talkValTimer() {
			$('#live_talk').val('1');
		}

		function hideMessage(timeout) {
			//$('.message').stop().css('opacity',1);
			if (timeout === null) timeout = 5000;
			$('.message').delay(timeout).fadeTo(200, 0);
		}

		function initLive2d() {
			$('#hideButton').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "0");
					$('#landlord').fadeOut(200);
					$('#open_live2d').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#open_live2d').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "1");
					$('#open_live2d').fadeOut(200);
					$('#landlord').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#youduButton').on('click', function () {
				if ($('#youduButton').hasClass('doudong')) {
					var typeIs = $('#youduButton').attr('data-type');
					$('#youduButton').removeClass('doudong');
					$('body').removeClass(typeIs);
					$('#youduButton').attr('data-type', '');
				} else {
					var duType = $('#duType').val();
					var duArr = duType.split(",");
					var dataType = duArr[Math.floor(Math.random() * duArr.length)];

					$('#youduButton').addClass('doudong');
					$('#youduButton').attr('data-type', dataType);
					$('body').addClass(dataType);
				}
			});
			if (apiKey) {
				$('#showInfoBtn').on('click', function () {
					var live_statu = $('#live_statu_val').val();
					if (live_statu == "0") {
						return
					} else {
						$('#live_statu_val').val("0");
						$('.live_talk_input_body').fadeOut(500);
						AITalkFlag = false;
						showHitokoto();
						$('#showTalkBtn').show();
						$('#showInfoBtn').hide();
					}
				});
				$('#showTalkBtn').on('click', function () {
					var live_statu = $('#live_statu_val').val();
					if (live_statu == "1") {
						return
					} else {
						$('#live_statu_val').val("1");
						$('.live_talk_input_body').fadeIn(500);
						AITalkFlag = true;
						$('#showTalkBtn').hide();
						$('#showInfoBtn').show();

					}
				});
				$('#talk_send').on('click', function () {
					var info_ = $('#AIuserText').val();
					var userid_ = $('#AIuserName').val();
					if (info_ == "") {
						showMessage('写点什么吧！', 0);
						return;
					}
					if (userid_ == "") {
						showMessage('聊之前请告诉我你的名字吧！', 0);
						return;
					}
					showMessage('思考中~', 0);
					let protocol = window.location.protocol.indexOf("s") > 0 ? "https" : "http";
					$.ajax({
						type: "get",
						url: `${protocol}://www.tuling123.com/openapi/api?key=${apiKey}&info=${info_}`,
						dataType: "json",
						success: function (res) {
							talkValTimer();
							showMessage(res.text, 0);
							$('#AIuserText').val("");
							sessionStorage.setItem("live2duser", userid_);
						},
						error: function (e) {
							talkValTimer();
							showMessage('似乎有什么错误，请和站长联系！', 0);
						}
					});
				});
			} else {
				$('#showInfoBtn').hide();
				$('#showTalkBtn').hide();
			}
			//获取音乐信息初始化
			var bgmListInfo = $('input[name=live2dBGM]');
			if (bgmListInfo.length == 0) {
				$('#musicButton').hide();
			} else {
				var bgmPlayNow = parseInt($('#live2d_bgm').attr('data-bgm'));
				var bgmPlayTime = 0;
				var live2dBGM_Num = sessionStorage.getItem("live2dBGM_Num");
				var live2dBGM_PlayTime = sessionStorage.getItem("live2dBGM_PlayTime");
				if (live2dBGM_Num) {
					if (live2dBGM_Num <= $('input[name=live2dBGM]').length - 1) {
						bgmPlayNow = parseInt(live2dBGM_Num);
					}
				}
				if (live2dBGM_PlayTime) {
					bgmPlayTime = parseInt(live2dBGM_PlayTime);
				}
				var live2dBGMSrc = bgmListInfo.eq(bgmPlayNow).val();
				$('#live2d_bgm').attr('data-bgm', bgmPlayNow);
				$('#live2d_bgm').attr('src', live2dBGMSrc);
				$('#live2d_bgm')[0].currentTime = bgmPlayTime;
				$('#live2d_bgm')[0].volume = 0.5;
				var live2dBGM_IsPlay = sessionStorage.getItem("live2dBGM_IsPlay");
				var live2dBGM_WindowClose = sessionStorage.getItem("live2dBGM_WindowClose");
				if (live2dBGM_IsPlay == '0' && live2dBGM_WindowClose == '0') {
					$('#live2d_bgm')[0].play();
					$('#musicButton').addClass('play');
				}
				sessionStorage.setItem("live2dBGM_WindowClose", '1');
				$('#musicButton').on('click', function () {
					if ($('#musicButton').hasClass('play')) {
						$('#live2d_bgm')[0].pause();
						$('#musicButton').removeClass('play');

<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;

  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'

          duration: MOTION_TIME,
          begin: function() {

              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;h2 id=&#34;国家哲学社会科学文献中心&#34;&gt;&lt;a href=&#34;http://www.ncpssd.org/&#34;&gt;国家哲学社会科学文献中心&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;提供免费下载，提供各类哲学社会科学文献。&lt;/p&gt;
&lt;p&gt;搜索功能强大，提供分类搜索、提名/关键词等搜索，也可以输入关键词进行查找。收录中外文学术期刊 7000 多种，还有图书、古籍，上线数据已超千万，内容丰富。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/eb54fda99a6dcb5ae764d82267311181c&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;中国国家数字图书馆&#34;&gt;&lt;a href=&#34;http://mylib.nlc.cn/&#34;&gt;中国国家数字图书馆&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;中国国家数字图书馆是中国国家图书馆的在线网站。它内置了文津搜索，可以搜索馆藏书，当然还能免费搜索到电子期刊，图书，论文，报纸，还有各种工具书等。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/eb508bde7830ea73087585ab6ef68dc63&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;德国springer-verlag&#34;&gt;&lt;a href=&#34;https://link.springer.com/&#34;&gt;德国Springer-Verlag&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;是世界著名科技出版集团，日前在国内开通了SpringerLink 服务。SpringerLink 所有资源划分为人文、生物、天文、物理等 12 个学科，提供海量相关期刊、图书、工具书查询，大部分图书支持免费下载 PDF 格式文件。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/eaab917a4db2a45736a1a83d9bf870e34&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;国家数据&#34;&gt;&lt;a href=&#34;http://data.stats.gov.cn/&#34;&gt;国家数据&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;写论文的时候肯定会需要各种数据，比如某个省 10 年内的 GDP 或城镇化的数据之类的。有了这个网站，就再也不用担心论文木有数据支撑啦。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/eb979844c8789862c8b5fe9139c062fcb&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;术语在线&#34;&gt;&lt;a href=&#34;http://www.termonline.cn/index.htm&#34;&gt;术语在线&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;是由全国科学技术名词审定委员会主办的平台，基本上可以满足各个领域论文的术语检索要求，覆盖基础科学、工程与技术科学、农业科学、医学、人文社会科学、军事科学等各个领域的 100 余个学科。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/eb83ac195e4410f8c233d309d2c31ed33&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;jstor&#34;&gt;&lt;a href=&#34;https://www.jstor.org/&#34;&gt;JSTOR&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;JSTOR 全名为 Journal Storage，是一个对过期期刊进行数字化的非营利性机构。最初目的主要是解决图书馆期刊不断增长的问题。你可以在其中找到从创刊号到过去三五年前的期刊 PDF 格式全文。部分期刊可追溯到 1665 年。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;6&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/e968707bc4d8cf9d64c330e0cecb2e6ac&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h1 id=&#34;4个值得大学生收藏并深度阅读的网站&#34;&gt;4个值得大学生收藏并深度阅读的网站。&lt;/h1&gt;
&lt;h2 id=&#34;一waitbutwhy&#34;&gt;&lt;a href=&#34;https://waitbutwhy.com/&#34;&gt;（一）Waitbutwhy&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;你或多或少在 TED 上看过 Tim Urban 的演讲《拖延症人群的内心世界》，但更有意思的是，他和他的合伙人多年前建立了一个名为 Waitbutwhy 的网站，大部分时候都由自己主笔，两三千字只是小意思，Tim Urban 写过很多万字、好几万字长文，深度剖析众多话题，比如如何规划自己的职业生涯、从漫长的人类历史宏观看待脑机接口的未来、如何选择你的另一半……而这些内容都让 Waitbutwhy 成为了爆款网站，就连马斯克也是这里的读者。诚然，Tim Urban 不是某一方面的顶级专家，但他的思考方式才是青年学习的榜样；&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;7&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/e4f632ad2871b23b83e1a5b4b1aa33b4f&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;二theschooloflife&#34;&gt;&lt;a href=&#34;https://www.theschooloflife.com/&#34;&gt;（二）Theschooloflife&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;顾名思义，人生学校。你可以在其中看到很多关于人生的问题，在【THE BOOK OF LIFE】当中，有更多类目——社会关系、自我认知、社交等等——如何学会更自私一些，每个人真正想要的是什么……你会找到一些答案，但你要相信，你的人生没有确切答案。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;8&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/e9a8e2afa43ffa4b058c114c296d50dd9&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;三80000hours&#34;&gt;&lt;a href=&#34;https://80000hours.org/&#34;&gt;三）80000Hours&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;80000 Hours 有一个较大的雄心，它希望让人们的职业生涯给社会带来积极影响。不过落到实处，青年人可以在其中看到关于职业发展的免费、优质建议。比如它可能不会建议你追随你的直觉、你的热情，而是让你深入思考、更加理性。值得一提的是，这是一家非盈利机构，你可以在网站中看到更新的财务公布，以及捐助者。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;9&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/e32938262c604f22dc3d3d40f14364930&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;四ted-talks&#34;&gt;&lt;a href=&#34;https://www.ted.com/&#34;&gt;（四）TED Talks&lt;/a&gt;&lt;/h2&gt;
&lt;p&gt;毋庸置疑，TED 提供全世界范围内极其优质的演讲，有人戏称为全球最后一片净土。也许你仅仅只是想用来学习英语，或者开开眼界。你可以在网站上输入感兴趣的类目以及基本的需求，并且通过注册账号得到推荐的观看内容，但我们的建议是，花点时间从所有的几千支内容中找到你的需求。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;10&#34;&gt;&lt;img src=&#34;https://cdn.labs.topbook.cc/topbook/img/e993069351344072fcf83f83ad9a5962c&#34; alt=&#34;topbook&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
">自我的提升——学习网站</a>
      </div>
      
      <div class="item">
        <a class="result-title" href="https://lxj5820.github.io/post/003/"" data-c="
          &lt;h3 id=&#34;认识markdow&#34;&gt;认识Markdow&lt;/h3&gt;
&lt;p&gt;Markdown 是一种「标记语言」，通过简单的标记语法，使普通文本内容具有一定的格式。它最大的三个优点是：轻量、简单、通用，当前已经有很多人用它来写博客、写书甚至是写论文。&lt;/p&gt;
&lt;!-- more --&gt;
&lt;p&gt;它主要的好处有  [^1]  ：&lt;br&gt;
专注于文字而抛开烦人的排版&lt;br&gt;
支持各种文本编辑器打开&lt;br&gt;
轻松转换为html、PDF等格式&lt;br&gt;
极好的可读性&lt;/p&gt;
&lt;h2 id=&#34;基础语法&#34;&gt;基础语法&lt;/h2&gt;
&lt;h3 id=&#34;标题&#34;&gt;标题&lt;/h3&gt;
&lt;p&gt;Markdown支持6种级别的标题，对应html标签 h1 ~ h6&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# h1
## h2
### h3
#### h4
##### h5
###### h6
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;除此之外，Markdown还支持另外一种形式的标题展示形式，其类似于 Setext 标记语言的表现形式，使用下划线进行文本大小的控制&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;wqd
这是一级标题
===
这是二级标题
---
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这种处理方式在Github的一些开源工程上面比较常见，显而易见的缺点是：文字大小控制级别有限。&lt;/p&gt;
&lt;h3 id=&#34;段落及区块引用&#34;&gt;段落及区块引用&lt;/h3&gt;
&lt;p&gt;需要记住的是，Markdown其实就是一种易于编写的普通文本，只不过加入了部分渲染文本的标签而已。其最终依然会转换为html标签，因此使用Markdown分段非常简单，前后至少保留一个空行即可&lt;/p&gt;
&lt;p&gt;而另外一个比较常见的需求就是，我们可能希望对某段文字进行强调处理。Markdown提供了一个特殊符号&amp;gt;用于段首进行强调，被强调的文字部分将会高亮显示&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;gt; 这段文字将被高亮显示...
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;插入链接或图片&#34;&gt;插入链接或图片&lt;/h3&gt;
&lt;p&gt;Markdown针对链接和图片的处理也比较简单，可以使用下面的语法进行标记&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;[点击跳转至百度](http://www.baidu.com)
![图片](https://upload-images.jianshu.io/upload_images/703764-605e3cc2ecb664f6.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240)
&lt;/code&gt;&lt;/pre&gt;
&lt;blockquote&gt;
&lt;p&gt;注： 引用图片和链接的唯一区别就是在最前方添加一个感叹号。&lt;/p&gt;
&lt;/blockquote&gt;
&lt;h3 id=&#34;列表&#34;&gt;列表&lt;/h3&gt;
&lt;p&gt;Markdown支持有序列表和无序列表两种形式：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;无序列表使用*或+或-标识&lt;/li&gt;
&lt;li&gt;有序列表使用数字加.标识，例如：1.&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code&gt;* 黄瓜
* 玉米
* 茄子

+ 黄瓜
+ 玉米
+ 茄子

- 黄瓜
- 玉米
- 茄子

1. 黄瓜
2. 玉米
3. 茄子
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;注：这里比较有趣的地方是，对于有序列表，Markdown将只关注你的第一个项目的数字编号。例如：如果第一个项目编号是3，以此类推，第二个项目应该是4，最终将显示为3、4、5。而如果你指定了第一个编号，后面的编号指定错误也没有关系，Markdown将只在乎你的第一个项目编号。&lt;/p&gt;
&lt;h4 id=&#34;使用列表的一些注意事项&#34;&gt;使用列表的一些注意事项&lt;/h4&gt;
&lt;p&gt;如果在单一列表项中包含了多个段落，为了保证渲染正常，*与段落首字母之间必须保留四个空格&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;*    段落一

     小段一
*    段落二

     小段二
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;另外，如果在列表中加入了区块引用，区域引用标记符也需要缩进4个空格&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;* 段落一
    &amp;gt; 区块标记一
* 段落二
    &amp;gt; 区块标记二
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;注：记住一个原则，如果在和列表配合使用的时候出现了问题，就缩进一次，四个空格或者一个制表符代表一次缩进。如果一次缩进没有解决问题，那就两次。&lt;/p&gt;
&lt;h3 id=&#34;分隔线&#34;&gt;分隔线&lt;/h3&gt;
&lt;p&gt;有时候，为了排版漂亮，可能会加入分隔线。Markdown加入分隔线非常简单，使用下面任意一种形式都可以&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;***
---
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;产生分隔线的语法要求比较松，符号之间添加空格也可以。&lt;/p&gt;
&lt;h3 id=&#34;强调&#34;&gt;强调&lt;/h3&gt;
&lt;p&gt;有时候，我们希望对某一部分文字进行强调，使用*或_包裹即可。使用单一符号标记的效果是斜体，使用两个符号标记的效果是加粗&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;*这里是斜体*
_这里是斜体_

**这里是加粗**
__这里是加粗__
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;##高级用法&lt;/p&gt;
&lt;h3 id=&#34;插入代码块&#34;&gt;插入代码块&lt;/h3&gt;
&lt;p&gt;Markdown在IT圈子里面比较流行的一个重要原因是，它能够轻松漂亮地插入代码。&lt;/p&gt;
&lt;p&gt;方法是，使用反引号`进行包裹即可。如果是行内代码引用，使用单个反引号进行包裹&lt;/p&gt;
&lt;p&gt;这是一段&lt;code&gt;var x = 3&lt;/code&gt;行内代码&lt;/p&gt;
&lt;p&gt;如果插入一整段代码，需要至少使用两个以上反引号进行包裹， 看效果：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;fun (x: Int, y: Int): Int {
  return x + y
}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;注：很多人不知道怎么输入反引号。在英文模式下，找到键盘最左侧esc键下面的第一个键点击即可。&lt;/p&gt;
&lt;h3 id=&#34;插入表格&#34;&gt;插入表格&lt;/h3&gt;
&lt;p&gt;表格是Markdown语法中比较复杂的一个，其语法如下：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;表头|条目一|条目二
:---:|:---:|:---:
项目|项目一|项目二
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;以上标记显示效果如下：&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style=&#34;text-align:center&#34;&gt;表头&lt;/th&gt;
&lt;th style=&#34;text-align:center&#34;&gt;条目一&lt;/th&gt;
&lt;th style=&#34;text-align:center&#34;&gt;条目二&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:center&#34;&gt;项目&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;项目一&lt;/td&gt;
&lt;td style=&#34;text-align:center&#34;&gt;项目二&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;p&gt;注：三个短斜杠左右的冒号用于控制对齐方式，只放置左边冒号表示文字居左，只放置右边冒号表示文字居右，如果两边都放置冒号表示文字居中。&lt;/p&gt;
&lt;h2 id=&#34;其它&#34;&gt;其它&lt;/h2&gt;
&lt;h3 id=&#34;特殊符号处理&#34;&gt;特殊符号处理&lt;/h3&gt;
&lt;p&gt;Markdown使用反斜杠\插入语法中用到的特殊符号。在Markdown中，主要有以下几种特殊符号需要处理：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;\   反斜线
`   反引号
*   星号
_   底线
{}  花括号
[]  方括号
()  括弧
#   井字号
+   加号
-   减号
.   英文句点
!   惊叹号
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;例如，如果你需要插入反斜杠，就连续输入两个反斜杠即可：\ =&amp;gt; \ 。&lt;/p&gt;
&lt;p&gt;注：在内容中输入以上特殊符号的时候一定要注意转义，否则将导致内容显示不全，甚至排版混乱。&lt;/p&gt;
&lt;h3 id=&#34;如何给文字上色&#34;&gt;如何给文字上色&lt;/h3&gt;
&lt;p&gt;使用Markdown的同学最郁闷的地方恐怕就是不能给文字添加颜色了。事实上，Markdown的最初目标就是为纯写作而生的。因此，它并没有考虑文字颜色这一点。所以，单纯使用Markdown设置文字颜色已经做不到了。但你可以这样做：&lt;/p&gt;
&lt;p&gt;先用Markdown编辑完成&lt;br&gt;
导出为html，在需要上色的部分手动添加标签&lt;code&gt;&amp;lt;font color=&#39;#ff0000&#39;&amp;gt;内容&amp;lt;/font&amp;gt;&lt;/code&gt;保存即可。&lt;/p&gt;
&lt;h3 id=&#34;文字居中&#34;&gt;文字居中&lt;/h3&gt;
&lt;p&gt;在Markdown中有时会需要让文字在页面中居中只需要&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; &amp;lt;center&amp;gt;这段文字需要居中&amp;lt;/center&amp;gt; 
&lt;/code&gt;&lt;/pre&gt;
  &lt;center&gt;这段文字需要居中&lt;/center&gt; 
&lt;h2 id=&#34;简单总结&#34;&gt;简单总结&lt;/h2&gt;
&lt;p&gt;Markdown是一门比html更简单的标记语言，其主要用于日常写作。最终通过相应的编辑器或者脚本转换成html用于页面渲染。如果你是一个作家，或者是一个程序员，Markdown对你来说是一门必备的技能。掌握Markdown真的很简单，如你所见，这篇文章使用了这么短的篇幅就已经将Markdown的语法全部介绍完了。&lt;/p&gt;

      <div class="item">
        <a class="result-title" href="https://lxj5820.github.io/post/2/"" data-c="
          &lt;p&gt;&lt;font color=red&gt;&lt;strong&gt;这是我的第一篇内容&lt;/strong&gt;&lt;/font&gt;&lt;br&gt;
本补丁只适用于微信电脑版&lt;/p&gt;
&lt;p&gt;PC微信制作防撤回+多开教程《无视微信版本》【小白级步骤】&lt;br&gt;
【本教程纯属小小小白级教程，无技术含量，大神勿喷，谢谢】&lt;br&gt;
（对应防撤回特征码及补丁，以后更新微信版本当前特征码同样可用）&lt;br&gt;
【2019年发布帖子   2020年4月更新成品补丁    以后本教程也同样有效】&lt;/p&gt;
&lt;!-- more --&gt;
&lt;p&gt;特点：&lt;br&gt;
1、简化操作，只要几步就可以做出补丁了，方法更直接更简单明了。&lt;br&gt;
2、让想要动手尝试的小小白或者怕别人发布的成品有问题，不放心的，可以自己动手，自己做补丁，这样就更放心了。&lt;/p&gt;
&lt;p&gt;1、关闭电脑杀毒软件，下载OD调试软件&lt;br&gt;
52专用OD&lt;a href=&#34;http://down.52pojie.cn/Tools/Debuggers/%E5%90%BE%E7%88%B1%E7%A0%B4%E8%A7%A3%E4%B8%93%E7%94%A8%E7%89%88Ollydbg.rar&#34;&gt;下载链接&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;2、解压到任意位置，并执行以下操作。&lt;br&gt;
点击《路径修复》--点击《Udd Cleaner》&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225068383.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;3、打开《吾爱破解[LCG].exe》进入OD界面，选择左上角的《文件》《打开》选择微信的安装路径：C:\Program Files (x86)\Tencent\WeChat，打开《WeChat.exe》&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225141523.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225150998.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;4、打开后，点击OD界面左上角的《调试》《运行》然后程序运行后打开了微信的二维码登陆界面，这个界面先放在一边不用管。&lt;br&gt;
在OD界面的左上角选择《窗口》《Executable modules》&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225181315.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;5、然后进入Executable modules界面，点击第一行的《路径》进行排序，然后选择《WeChatWin.dll》这个文件，双击进入--回到主线程界面&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225209584.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225258699.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;6、在上图的任意位置右击《查找》《二进制字串》&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225288972.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;7、得到如下图后，然后复制特征码：8B068BCEFF501885C00F8431FFFFFF&lt;br&gt;
在《HEX +00》位置右击粘贴《确定》，&lt;br&gt;
定位后选择定位下面的第3个JE《********   /74 7B  je short WeChatWi.********》双击它，出现汇编窗口，修改JE为JMP&lt;br&gt;
再点击《汇编》，然后点击《取消》退出汇编窗口。&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225317890.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225421516.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225336639.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;8、最后下图位置右击《&lt;font color=red&gt;复制到可执行文件&lt;/font&gt;》《&lt;font color=red&gt;所有修改&lt;/font&gt;》《&lt;font color=red&gt;全部复制&lt;/font&gt;》，进入D界面，然后在D界面右击《&lt;font color=red&gt; 保存文件 &lt;/font&gt;》&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225384275.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225439915.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;9、然后保存为WeChatWin.dll，替换掉微信路径下原来的WeChatWin.dll文件&lt;br&gt;
防撤回功能就完成了《&lt;font color=red&gt;实际使用上有撤回提示&lt;/font&gt;》。&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225459299.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;h2 id=&#34;二-使用od制作pc微信多开功能&#34;&gt;二、使用OD制作PC微信多开功能。&lt;/h2&gt;
&lt;p&gt;前面的1-6的步骤同防撤回一样，就不再重复写了&lt;br&gt;
&lt;font color=red&gt;第7步&lt;/font&gt;、得到如下图后，然后复制特征码：&lt;font color=red&gt;84C0740883CBFF&lt;/font&gt;&lt;br&gt;
在《HEX +00》位置右击粘贴《确定》，&lt;br&gt;
定位后选择&lt;font color=red&gt;定位下面的第一个JE&lt;/font&gt;《********   /74 08  je short WeChatWi.********》&lt;font color=red&gt;双击它&lt;/font&gt;，出现汇编窗口，&lt;font color=red&gt;修改JE为JMP&lt;/font&gt;&lt;br&gt;
再点击《&lt;font color=red&gt;汇编&lt;/font&gt;》，然后点击《取消》退出汇编窗口。&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225735433.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225789004.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;第8、9步骤和防撤回一样，也不再重复了，&lt;br&gt;
注：防撤回和多开可以一起处理好后一起保存好，这样就同时拥有2个功能了。&lt;br&gt;
这边分两个是因为分开来讲解。&lt;br&gt;
↓↓↓↓↓多开效果↓↓↓↓↓&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225817923.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;三、使用特征码制作PATCH补丁（无视微信版本一直可用，此方法不修改任何文件）&lt;br&gt;
防撤回原始特征码：8B068BCEFF501885C00F8431FFFFFF&lt;br&gt;
防撤回修改特征码：8B068BCEFF501885D00F8431FFFFFF（当前代码撤回无提示）&lt;br&gt;
输入完成后点《添加》《生成补丁》保存名称：1.exe&lt;br&gt;
使用方法：请先手动打开微信(任意界面均可)，然后等patch工具上显示“已运行”再点击工具上的patch按钮。&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225852129.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
&lt;img src=&#34;https://lxj5820.github.io/post-images/1588225881151.gif&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;&lt;font color=red&gt;XH 补丁制作工具1.2.5下载（已更新）&lt;/font&gt;&lt;br&gt;
https://www.lanzous.com/i778f3a   密码:87q1&lt;/p&gt;
">【Windows】微信2.9.0.114防撤回多开-附学习笔记</a>
      </div>

=\&#34;https://winim.lanzous.com/id1fivi\&#34;&gt;🌏点击下载&lt;/a&gt;&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;【windows】QQ3.3.3防撤回微信2.9.123防撤回_多开&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-05-28 17:36:32&#34;,&#34;dateFormat&#34;:&#34;2020-05-28&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/0MGd0kMe1/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:44000,&#34;words&#34;:213,&#34;minutes&#34;:1},&#34;description&#34;:&#34;更新微信2.9.0.123版正式版（带撤回提示、多开）🌏点击下载\n更新QQ3.3.3（27009）正式版防撤回 🌏点击下载\n\n注：有些朋友替换出现无法登陆现象请注意自己的版本是否与描述的不同！请更新到最新版本在使用！    还有些不知道...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;8个不差的慕课网站适合大学生和长期学习者\&#34;&gt;8个不差的慕课网站，适合大学生和长期学习者&lt;/h1&gt;\n&lt;p&gt;很多人对于学习这件事情，非常在意。可大多卡死在一个问题上：哪里有适合自己的学习资源？&lt;/p&gt;\n&lt;p&gt;TED？很不错，不仅能打开自己的认知，训练创造性思维，还可以顺便学学英语；哔哩哔哩？不错，其实除了番剧，对于年轻人来说，有很多教程资源都可以找到。初次之外，各大视频网站在藏得比较深的地方也都有教育相关的内容。在这些平台上，你会觉得，这似乎是个娱乐至上的时代。&lt;/p&gt;\n&lt;p&gt;而在另一些地方，你会觉得这是一个学习致死的时代。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;让我们先把纯技能学习型、报班培训型、包教包会型完全放在一边。我们最最需要的，其实是常识——简而言之，就是一个生活在社会中的心智健全的人应该具备的基本知识。这也是拥有完整思维体系的必要前提。&lt;/p&gt;\n&lt;p&gt;常识教育大多来自于传统的学校和课堂之中，但选定某些课程后必然失去学习其他课程的机会，不同学校也拥有不同的教育资源，离开学校以后，更多人当然也失去了这类常识教育的便利性。但网络很好地解决了这个问题。&lt;/p&gt;\n&lt;p&gt;2012 年，美国一些顶尖大学开始陆续设立网络公开课，在网上提供免费课程，其中就包括 Coursera 、Udacity 和 edX 。其中 Coursera 经过多年发展，已经拥有中文语言。2013 年，新加坡国立大学开始和 Coursera 合作，加入大型开放式网络课程平台，英文是 massive open online courses，简称 MOOC，也就是我们俗称的 MOOC，到今天我们所看到的 来自网易的 中国大学 MOOC ，来自果壳网的 MOOC 学院等等都衍生于此。&lt;/p&gt;\n&lt;p&gt;其中网易承接的是国家教育部精品课程项目，所以网站上大多内容来自于国内外众多知名高校和机构。相比  Coursera，它更加本土化，适合中国人学习。在网站中随时都能找到适合自己的课程。&lt;/p&gt;\n&lt;p&gt;而像 MOOC 学院、MOOC 中国，都链接了国外众多 MOOC 平台资源，你可以更加容易地通过它们找到需要的任何课程。&lt;/p&gt;\n&lt;p&gt;至于其他的名曰 [ XX大学 ] 之类的课程，除非是技能培训和有经过考证的素质教育培训，否则，盲目的学习只会让你交足了智商税而已。&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;https://www.coursera.org/\&#34;&gt;Courserap&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;https://www.edx.org/\&#34;&gt;EDX&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;https://www.icourse163.org/\&#34;&gt;中国大学 MOOC&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;http://www.icourses.cn/\&#34;&gt;爱课程&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;https://mooc.guokr.com/\&#34;&gt;MOOC 学院&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;http://www.cnmooc.org/home/index.mooc\&#34;&gt;好大学在线&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;http://www.mooc.cn/\&#34;&gt;MOOC 中国 &lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;🌏 &lt;a href=\&#34;http://www.xuetangx.com/\&#34;&gt;学堂在线&lt;/a&gt;&lt;/p&gt;\n&lt;h1 id=\&#34;6个学术文献资料查询网站\&#34;&gt;6个学术文献资料查询网站&lt;/h1&gt;\n&lt;h2 id=\&#34;国家哲学社会科学文献中心\&#34;&gt;&lt;a href=\&#34;http://www.ncpssd.org/\&#34;&gt;国家哲学社会科学文献中心&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;提供免费下载，提供各类哲学社会科学文献。&lt;/p&gt;\n&lt;p&gt;搜索功能强大，提供分类搜索、提名/关键词等搜索，也可以输入关键词进行查找。收录中外文学术期刊 7000 多种，还有图书、古籍，上线数据已超千万，内容丰富。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/eb54fda99a6dcb5ae764d82267311181c\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;中国国家数字图书馆\&#34;&gt;&lt;a href=\&#34;http://mylib.nlc.cn/\&#34;&gt;中国国家数字图书馆&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;中国国家数字图书馆是中国国家图书馆的在线网站。它内置了文津搜索，可以搜索馆藏书，当然还能免费搜索到电子期刊，图书，论文，报纸，还有各种工具书等。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/eb508bde7830ea73087585ab6ef68dc63\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;德国springer-verlag\&#34;&gt;&lt;a href=\&#34;https://link.springer.com/\&#34;&gt;德国Springer-Verlag&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;是世界著名科技出版集团，日前在国内开通了SpringerLink 服务。SpringerLink 所有资源划分为人文、生物、天文、物理等 12 个学科，提供海量相关期刊、图书、工具书查询，大部分图书支持免费下载 PDF 格式文件。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/eaab917a4db2a45736a1a83d9bf870e34\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;国家数据\&#34;&gt;&lt;a href=\&#34;http://data.stats.gov.cn/\&#34;&gt;国家数据&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;写论文的时候肯定会需要各种数据，比如某个省 10 年内的 GDP 或城镇化的数据之类的。有了这个网站，就再也不用担心论文木有数据支撑啦。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;4\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/eb979844c8789862c8b5fe9139c062fcb\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;术语在线\&#34;&gt;&lt;a href=\&#34;http://www.termonline.cn/index.htm\&#34;&gt;术语在线&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;是由全国科学技术名词审定委员会主办的平台，基本上可以满足各个领域论文的术语检索要求，覆盖基础科学、工程与技术科学、农业科学、医学、人文社会科学、军事科学等各个领域的 100 余个学科。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;5\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/eb83ac195e4410f8c233d309d2c31ed33\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;jstor\&#34;&gt;&lt;a href=\&#34;https://www.jstor.org/\&#34;&gt;JSTOR&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;JSTOR 全名为 Journal Storage，是一个对过期期刊进行数字化的非营利性机构。最初目的主要是解决图书馆期刊不断增长的问题。你可以在其中找到从创刊号到过去三五年前的期刊 PDF 格式全文。部分期刊可追溯到 1665 年。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;6\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e968707bc4d8cf9d64c330e0cecb2e6ac\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h1 id=\&#34;4个值得大学生收藏并深度阅读的网站\&#34;&gt;4个值得大学生收藏并深度阅读的网站。&lt;/h1&gt;\n&lt;h2 id=\&#34;一waitbutwhy\&#34;&gt;&lt;a href=\&#34;https://waitbutwhy.com/\&#34;&gt;（一）Waitbutwhy&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;你或多或少在 TED 上看过 Tim Urban 的演讲《拖延症人群的内心世界》，但更有意思的是，他和他的合伙人多年前建立了一个名为 Waitbutwhy 的网站，大部分时候都由自己主笔，两三千字只是小意思，Tim Urban 写过很多万字、好几万字长文，深度剖析众多话题，比如如何规划自己的职业生涯、从漫长的人类历史宏观看待脑机接口的未来、如何选择你的另一半……而这些内容都让 Waitbutwhy 成为了爆款网站，就连马斯克也是这里的读者。诚然，Tim Urban 不是某一方面的顶级专家，但他的思考方式才是青年学习的榜样；&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;7\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e4f632ad2871b23b83e1a5b4b1aa33b4f\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;二theschooloflife\&#34;&gt;&lt;a href=\&#34;https://www.theschooloflife.com/\&#34;&gt;（二）Theschooloflife&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;顾名思义，人生学校。你可以在其中看到很多关于人生的问题，在【THE BOOK OF LIFE】当中，有更多类目——社会关系、自我认知、社交等等——如何学会更自私一些，每个人真正想要的是什么……你会找到一些答案，但你要相信，你的人生没有确切答案。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;8\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e9a8e2afa43ffa4b058c114c296d50dd9\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;三80000hours\&#34;&gt;&lt;a href=\&#34;https://80000hours.org/\&#34;&gt;三）80000Hours&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;80000 Hours 有一个较大的雄心，它希望让人们的职业生涯给社会带来积极影响。不过落到实处，青年人可以在其中看到关于职业发展的免费、优质建议。比如它可能不会建议你追随你的直觉、你的热情，而是让你深入思考、更加理性。值得一提的是，这是一家非盈利机构，你可以在网站中看到更新的财务公布，以及捐助者。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;9\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e32938262c604f22dc3d3d40f14364930\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;四ted-talks\&#34;&gt;&lt;a href=\&#34;https://www.ted.com/\&#34;&gt;（四）TED Talks&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;毋庸置疑，TED 提供全世界范围内极其优质的演讲，有人戏称为全球最后一片净土。也许你仅仅只是想用来学习英语，或者开开眼界。你可以在网站上输入感兴趣的类目以及基本的需求，并且通过注册账号得到推荐的观看内容，但我们的建议是，花点时间从所有的几千支内容中找到你的需求。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;10\&#34;&gt;&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e993069351344072fcf83f83ad9a5962c\&#34; alt=\&#34;topbook\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&#34;,&#34;fileName&#34;:&#34;MsHehdzVa&#34;,&#34;abstract&#34;:&#34;&lt;h1 id=\&#34;8个不差的慕课网站适合大学生和长期学习者\&#34;&gt;8个不差的慕课网站，适合大学生和长期学习者&lt;/h1&gt;\n&lt;p&gt;很多人对于学习这件事情，非常在意。可大多卡死在一个问题上：哪里有适合自己的学习资源？&lt;/p&gt;\n&lt;p&gt;TED？很不错，不仅能打开自己的认知，训练创造性思维，还可以顺便学学英语；哔哩哔哩？不错，其实除了番剧，对于年轻人来说，有很多教程资源都可以找到。初次之外，各大视频网站在藏得比较深的地方也都有教育相关的内容。在这些平台上，你会觉得，这似乎是个娱乐至上的时代。&lt;/p&gt;\n&lt;p&gt;而在另一些地方，你会觉得这是一个学习致死的时代。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;自我的提升——学习网站&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-05-28 15:44:31&#34;,&#34;dateFormat&#34;:&#34;2020-05-28&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/MsHehdzVa/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;7 min read&#34;,&#34;time&#34;:360000,&#34;words&#34;:1747,&#34;minutes&#34;:7},&#34;description&#34;:&#34;8个不差的慕课网站，适合大学生和长期学习者\n很多人对于学习这件事情，非常在意。可大多卡死在一个问题上：哪里有适合自己的学习资源？\nTED？很不错，不仅能打开自己的认知，训练创造性思维，还可以顺便学学英语；哔哩哔哩？不错，其实除了番剧，对于年...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#8%E4%B8%AA%E4%B8%8D%E5%B7%AE%E7%9A%84%E6%85%95%E8%AF%BE%E7%BD%91%E7%AB%99%E9%80%82%E5%90%88%E5%A4%A7%E5%AD%A6%E7%94%9F%E5%92%8C%E9%95%BF%E6%9C%9F%E5%AD%A6%E4%B9%A0%E8%80%85\&#34;&gt;8个不差的慕课网站，适合大学生和长期学习者&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#6%E4%B8%AA%E5%AD%A6%E6%9C%AF%E6%96%87%E7%8C%AE%E8%B5%84%E6%96%99%E6%9F%A5%E8%AF%A2%E7%BD%91%E7%AB%99\&#34;&gt;6个学术文献资料查询网站&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%BD%E5%AE%B6%E5%93%B2%E5%AD%A6%E7%A4%BE%E4%BC%9A%E7%A7%91%E5%AD%A6%E6%96%87%E7%8C%AE%E4%B8%AD%E5%BF%83\&#34;&gt;国家哲学社会科学文献中心&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%AD%E5%9B%BD%E5%9B%BD%E5%AE%B6%E6%95%B0%E5%AD%97%E5%9B%BE%E4%B9%A6%E9%A6%86\&#34;&gt;中国国家数字图书馆&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BE%B7%E5%9B%BDspringer-verlag\&#34;&gt;德国Springer-Verlag&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%BD%E5%AE%B6%E6%95%B0%E6%8D%AE\&#34;&gt;国家数据&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AF%E8%AF%AD%E5%9C%A8%E7%BA%BF\&#34;&gt;术语在线&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#jstor\&#34;&gt;JSTOR&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#4%E4%B8%AA%E5%80%BC%E5%BE%97%E5%A4%A7%E5%AD%A6%E7%94%9F%E6%94%B6%E8%97%8F%E5%B9%B6%E6%B7%B1%E5%BA%A6%E9%98%85%E8%AF%BB%E7%9A%84%E7%BD%91%E7%AB%99\&#34;&gt;4个值得大学生收藏并深度阅读的网站。&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%80waitbutwhy\&#34;&gt;（一）Waitbutwhy&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BA%8Ctheschooloflife\&#34;&gt;（二）Theschooloflife&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8980000hours\&#34;&gt;三）80000Hours&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%9Bted-talks\&#34;&gt;（四）TED Talks&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h3 id=\&#34;认识markdow\&#34;&gt;认识Markdow&lt;/h3&gt;\n&lt;p&gt;Markdown 是一种「标记语言」，通过简单的标记语法，使普通文本内容具有一定的格式。它最大的三个优点是：轻量、简单、通用，当前已经有很多人用它来写博客、写书甚至是写论文。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;它主要的好处有  [^1]  ：&lt;br&gt;\n专注于文字而抛开烦人的排版&lt;br&gt;\n支持各种文本编辑器打开&lt;br&gt;\n轻松转换为html、PDF等格式&lt;br&gt;\n极好的可读性&lt;/p&gt;\n&lt;h2 id=\&#34;基础语法\&#34;&gt;基础语法&lt;/h2&gt;\n&lt;h3 id=\&#34;标题\&#34;&gt;标题&lt;/h3&gt;\n&lt;p&gt;Markdown支持6种级别的标题，对应html标签 h1 ~ h6&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;# h1\n## h2\n### h3\n#### h4\n##### h5\n###### h6\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;除此之外，Markdown还支持另外一种形式的标题展示形式，其类似于 Setext 标记语言的表现形式，使用下划线进行文本大小的控制&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;wqd\n这是一级标题\n===\n这是二级标题\n---\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这种处理方式在Github的一些开源工程上面比较常见，显而易见的缺点是：文字大小控制级别有限。&lt;/p&gt;\n&lt;h3 id=\&#34;段落及区块引用\&#34;&gt;段落及区块引用&lt;/h3&gt;\n&lt;p&gt;需要记住的是，Markdown其实就是一种易于编写的普通文本，只不过加入了部分渲染文本的标签而已。其最终依然会转换为html标签，因此使用Markdown分段非常简单，前后至少保留一个空行即可&lt;/p&gt;\n&lt;p&gt;而另外一个比较常见的需求就是，我们可能希望对某段文字进行强调处理。Markdown提供了一个特殊符号&amp;gt;用于段首进行强调，被强调的文字部分将会高亮显示&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;&amp;gt; 这段文字将被高亮显示...\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;插入链接或图片\&#34;&gt;插入链接或图片&lt;/h3&gt;\n&lt;p&gt;Markdown针对链接和图片的处理也比较简单，可以使用下面的语法进行标记&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;[点击跳转至百度](http://www.baidu.com)\n![图片](https://upload-images.jianshu.io/upload_images/703764-605e3cc2ecb664f6.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240)\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;注： 引用图片和链接的唯一区别就是在最前方添加一个感叹号。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&#34;列表\&#34;&gt;列表&lt;/h3&gt;\n&lt;p&gt;Markdown支持有序列表和无序列表两种形式：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;无序列表使用*或+或-标识&lt;/li&gt;\n&lt;li&gt;有序列表使用数字加.标识，例如：1.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code&gt;* 黄瓜\n* 玉米\n* 茄子\n\n+ 黄瓜\n+ 玉米\n+ 茄子\n\n- 黄瓜\n- 玉米\n- 茄子\n\n1. 黄瓜\n2. 玉米\n3. 茄子\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;注：这里比较有趣的地方是，对于有序列表，Markdown将只关注你的第一个项目的数字编号。例如：如果第一个项目编号是3，以此类推，第二个项目应该是4，最终将显示为3、4、5。而如果你指定了第一个编号，后面的编号指定错误也没有关系，Markdown将只在乎你的第一个项目编号。&lt;/p&gt;\n&lt;h4 id=\&#34;使用列表的一些注意事项\&#34;&gt;使用列表的一些注意事项&lt;/h4&gt;\n&lt;p&gt;如果在单一列表项中包含了多个段落，为了保证渲染正常，*与段落首字母之间必须保留四个空格&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;*    段落一\n\n     小段一\n*    段落二\n\n     小段二\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;另外，如果在列表中加入了区块引用，区域引用标记符也需要缩进4个空格&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;* 段落一\n    &amp;gt; 区块标记一\n* 段落二\n    &amp;gt; 区块标记二\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;注：记住一个原则，如果在和列表配合使用的时候出现了问题，就缩进一次，四个空格或者一个制表符代表一次缩进。如果一次缩进没有解决问题，那就两次。&lt;/p&gt;\n&lt;h3 id=\&#34;分隔线\&#34;&gt;分隔线&lt;/h3&gt;\n&lt;p&gt;有时候，为了排版漂亮，可能会加入分隔线。Markdown加入分隔线非常简单，使用下面任意一种形式都可以&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;***\n---\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;产生分隔线的语法要求比较松，符号之间添加空格也可以。&lt;/p&gt;\n&lt;h3 id=\&#34;强调\&#34;&gt;强调&lt;/h3&gt;\n&lt;p&gt;有时候，我们希望对某一部分文字进行强调，使用*或_包裹即可。使用单一符号标记的效果是斜体，使用两个符号标记的效果是加粗&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;*这里是斜体*\n_这里是斜体_\n\n**这里是加粗**\n__这里是加粗__\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;##高级用法&lt;/p&gt;\n&lt;h3 id=\&#34;插入代码块\&#34;&gt;插入代码块&lt;/h3&gt;\n&lt;p&gt;Markdown在IT圈子里面比较流行的一个重要原因是，它能够轻松漂亮地插入代码。&lt;/p&gt;\n&lt;p&gt;方法是，使用反引号`进行包裹即可。如果是行内代码引用，使用单个反引号进行包裹&lt;/p&gt;\n&lt;p&gt;这是一段&lt;code&gt;var x = 3&lt;/code&gt;行内代码&lt;/p&gt;\n&lt;p&gt;如果插入一整段代码，需要至少使用两个以上反引号进行包裹， 看效果：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;fun (x: Int, y: Int): Int {\n  return x + y\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;注：很多人不知道怎么输入反引号。在英文模式下，找到键盘最左侧esc键下面的第一个键点击即可。&lt;/p&gt;\n&lt;h3 id=\&#34;插入表格\&#34;&gt;插入表格&lt;/h3&gt;\n&lt;p&gt;表格是Markdown语法中比较复杂的一个，其语法如下：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;表头|条目一|条目二\n:---:|:---:|:---:\n项目|项目一|项目二\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;以上标记显示效果如下：&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\&#34;text-align:center\&#34;&gt;表头&lt;/th&gt;\n&lt;th style=\&#34;text-align:center\&#34;&gt;条目一&lt;/th&gt;\n&lt;th style=\&#34;text-align:center\&#34;&gt;条目二&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;项目&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;项目一&lt;/td&gt;\n&lt;td style=\&#34;text-align:center\&#34;&gt;项目二&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;p&gt;注：三个短斜杠左右的冒号用于控制对齐方式，只放置左边冒号表示文字居左，只放置右边冒号表示文字居右，如果两边都放置冒号表示文字居中。&lt;/p&gt;\n&lt;h2 id=\&#34;其它\&#34;&gt;其它&lt;/h2&gt;\n&lt;h3 id=\&#34;特殊符号处理\&#34;&gt;特殊符号处理&lt;/h3&gt;\n&lt;p&gt;Markdown使用反斜杠\\插入语法中用到的特殊符号。在Markdown中，主要有以下几种特殊符号需要处理：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;\\   反斜线\n`   反引号\n*   星号\n_   底线\n{}  花括号\n[]  方括号\n()  括弧\n#   井字号\n+   加号\n-   减号\n.   英文句点\n!   惊叹号\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;例如，如果你需要插入反斜杠，就连续输入两个反斜杠即可：\\ =&amp;gt; \\ 。&lt;/p&gt;\n&lt;p&gt;注：在内容中输入以上特殊符号的时候一定要注意转义，否则将导致内容显示不全，甚至排版混乱。&lt;/p&gt;\n&lt;h3 id=\&#34;如何给文字上色\&#34;&gt;如何给文字上色&lt;/h3&gt;\n&lt;p&gt;使用Markdown的同学最郁闷的地方恐怕就是不能给文字添加颜色了。事实上，Markdown的最初目标就是为纯写作而生的。因此，它并没有考虑文字颜色这一点。所以，单纯使用Markdown设置文字颜色已经做不到了。但你可以这样做：&lt;/p&gt;\n&lt;p&gt;先用Markdown编辑完成&lt;br&gt;\n导出为html，在需要上色的部分手动添加标签&lt;code&gt;&amp;lt;font color=&#39;#ff0000&#39;&amp;gt;内容&amp;lt;/font&amp;gt;&lt;/code&gt;保存即可。&lt;/p&gt;\n&lt;h3 id=\&#34;文字居中\&#34;&gt;文字居中&lt;/h3&gt;\n&lt;p&gt;在Markdown中有时会需要让文字在页面中居中只需要&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt; &amp;lt;center&amp;gt;这段文字需要居中&amp;lt;/center&amp;gt; \n&lt;/code&gt;&lt;/pre&gt;\n  &lt;center&gt;这段文字需要居中&lt;/center&gt; \n&lt;h2 id=\&#34;简单总结\&#34;&gt;简单总结&lt;/h2&gt;\n&lt;p&gt;Markdown是一门比html更简单的标记语言，其主要用于日常写作。最终通过相应的编辑器或者脚本转换成html用于页面渲染。如果你是一个作家，或者是一个程序员，Markdown对你来说是一门必备的技能。掌握Markdown真的很简单，如你所见，这篇文章使用了这么短的篇幅就已经将Markdown的语法全部介绍完了。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;003&#34;,&#34;abstract&#34;:&#34;&lt;h3 id=\&#34;认识markdow\&#34;&gt;认识Markdow&lt;/h3&gt;\n&lt;p&gt;Markdown 是一种「标记语言」，通过简单的标记语法，使普通文本内容具有一定的格式。它最大的三个优点是：轻量、简单、通用，当前已经有很多人用它来写博客、写书甚至是写论文。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;关于学习Markdown写作(更新)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;学习&#34;,&#34;slug&#34;:&#34;YGlNDw4rT&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://lxj5820.github.io/tag/YGlNDw4rT/&#34;}],&#34;date&#34;:&#34;2020-05-25 17:24:30&#34;,&#34;dateFormat&#34;:&#34;2020-05-25&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/003/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;7 min read&#34;,&#34;time&#34;:362000,&#34;words&#34;:1718,&#34;minutes&#34;:7},&#34;description&#34;:&#34;认识Markdow\nMarkdown 是一种「标记语言」，通过简单的标记语法，使普通文本内容具有一定的格式。它最大的三个优点是：轻量、简单、通用，当前已经有很多人用它来写博客、写书甚至是写论文。\n\n它主要的好处有  [^1]  ：\n专注于文...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%AE%A4%E8%AF%86markdow\&#34;&gt;认识Markdow&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9F%BA%E7%A1%80%E8%AF%AD%E6%B3%95\&#34;&gt;基础语法&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A0%87%E9%A2%98\&#34;&gt;标题&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%AE%B5%E8%90%BD%E5%8F%8A%E5%8C%BA%E5%9D%97%E5%BC%95%E7%94%A8\&#34;&gt;段落及区块引用&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8F%92%E5%85%A5%E9%93%BE%E6%8E%A5%E6%88%96%E5%9B%BE%E7%89%87\&#34;&gt;插入链接或图片&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%88%97%E8%A1%A8\&#34;&gt;列表&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BD%BF%E7%94%A8%E5%88%97%E8%A1%A8%E7%9A%84%E4%B8%80%E4%BA%9B%E6%B3%A8%E6%84%8F%E4%BA%8B%E9%A1%B9\&#34;&gt;使用列表的一些注意事项&lt; ithub.io/post-images/she-ji-zuo-pin.png&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/she-ji-zuo-pin/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:1000,&#34;words&#34;:6,&#34;minutes&#34;:1},&#34;description&#34;:&#34;【效果】\n\n\n【平面】\n\n【结构】\n\n...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%95%88%E6%9E%9C\&#34;&gt;【效果】&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B9%B3%E9%9D%A2\&#34;&gt;【平面】&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%BB%93%E6%9E%84\&#34;&gt;【结构】&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h2 id=\&#34;01\&#34;&gt;01.&lt;/h2&gt;\n&lt;p&gt;在Windows 10 系统中，可以下载windows 客户端的同时，在微软应用商城下载另一个版本的独立应用&lt;br&gt;\n&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e5e5c26fcd441128f00acf6311a12f608\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;02\&#34;&gt;02.&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;\n&lt;p&gt;新建一个记事本&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;在其中输入&lt;code&gt;start &amp;quot;程序地址&amp;quot;&lt;/code&gt;（注意引号为英文状态，且前后有空格）&lt;/p&gt;\n&lt;p&gt;然后想开几个微信就复制几次&lt;br&gt;\n&lt;img src=\&#34;https://cdn.labs.topbook.cc/topbook/img/e4d59f89e66b50fd2b880d79235f057d2\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ol&gt;\n&#34;,&#34;fileName&#34;:&#34;wx&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;如何在电脑端同时开启多个微信&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-05-03 15:44:39&#34;,&#34;dateFormat&#34;:&#34;2020-05-03&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/wx/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:18000,&#34;words&#34;:85,&#34;minutes&#34;:1},&#34;description&#34;:&#34;01.\n在Windows 10 系统中，可以下载windows 客户端的同时，在微软应用商城下载另一个版本的独立应用\n\n02.\n\n\n新建一个记事本\n\n\n在其中输入start &amp;quot;程序地址&amp;quot;（注意引号为英文状态，且前后有空格...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#01\&#34;&gt;01.&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#02\&#34;&gt;02.&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;#仅在电脑网页可显示&lt;/p&gt;\n&lt;p&gt;接入图灵机器人支持各种生活服务，数字计算，图片搜索，中英翻译，新闻资讯，星座运势，笑话大全，故事大全等多种功能&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588228439166.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;!-- more --&gt;\n&#34;,&#34;fileName&#34;:&#34;3&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;#仅在电脑网页可显示&lt;/p&gt;\n&lt;p&gt;接入图灵机器人支持各种生活服务，数字计算，图片搜索，中英翻译，新闻资讯，星座运势，笑话大全，故事大全等多种功能&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588228439166.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;左下角的猫&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-04-30 14:25:11&#34;,&#34;dateFormat&#34;:&#34;2020-04-30&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/3/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:11000,&#34;words&#34;:57,&#34;minutes&#34;:1},&#34;description&#34;:&#34;#仅在电脑网页可显示\n接入图灵机器人支持各种生活服务，数字计算，图片搜索，中英翻译，新闻资讯，星座运势，笑话大全，故事大全等多种功能\n\n\n...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;&lt;font color=red&gt;&lt;strong&gt;这是我的第一篇内容&lt;/strong&gt;&lt;/font&gt;&lt;br&gt;\n本补丁只适用于微信电脑版&lt;/p&gt;\n&lt;p&gt;PC微信制作防撤回+多开教程《无视微信版本》【小白级步骤】&lt;br&gt;\n【本教程纯属小小小白级教程，无技术含量，大神勿喷，谢谢】&lt;br&gt;\n（对应防撤回特征码及补丁，以后更新微信版本当前特征码同样可用）&lt;br&gt;\n【2019年发布帖子   2020年4月更新成品补丁    以后本教程也同样有效】&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;特点：&lt;br&gt;\n1、简化操作，只要几步就可以做出补丁了，方法更直接更简单明了。&lt;br&gt;\n2、让想要动手尝试的小小白或者怕别人发布的成品有问题，不放心的，可以自己动手，自己做补丁，这样就更放心了。&lt;/p&gt;\n&lt;p&gt;1、关闭电脑杀毒软件，下载OD调试软件&lt;br&gt;\n52专用OD&lt;a href=\&#34;http://down.52pojie.cn/Tools/Debuggers/%E5%90%BE%E7%88%B1%E7%A0%B4%E8%A7%A3%E4%B8%93%E7%94%A8%E7%89%88Ollydbg.rar\&#34;&gt;下载链接&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;2、解压到任意位置，并执行以下操作。&lt;br&gt;\n点击《路径修复》--点击《Udd Cleaner》&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225068383.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;3、打开《吾爱破解[LCG].exe》进入OD界面，选择左上角的《文件》《打开》选择微信的安装路径：C:\\Program Files (x86)\\Tencent\\WeChat，打开《WeChat.exe》&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225141523.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225150998.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;4、打开后，点击OD界面左上角的《调试》《运行》然后程序运行后打开了微信的二维码登陆界面，这个界面先放在一边不用管。&lt;br&gt;\n在OD界面的左上角选择《窗口》《Executable modules》&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225181315.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;5、然后进入Executable modules界面，点击第一行的《路径》进行排序，然后选择《WeChatWin.dll》这个文件，双击进入--回到主线程界面&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225209584.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225258699.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;6、在上图的任意位置右击《查找》《二进制字串》&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225288972.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;7、得到如下图后，然后复制特征码：8B068BCEFF501885C00F8431FFFFFF&lt;br&gt;\n在《HEX +00》位置右击粘贴《确定》，&lt;br&gt;\n定位后选择定位下面的第3个JE《********   /74 7B  je short WeChatWi.********》双击它，出现汇编窗口，修改JE为JMP&lt;br&gt;\n再点击《汇编》，然后点击《取消》退出汇编窗口。&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225317890.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225421516.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225336639.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;8、最后下图位置右击《&lt;font color=red&gt;复制到可执行文件&lt;/font&gt;》《&lt;font color=red&gt;所有修改&lt;/font&gt;》《&lt;font color=red&gt;全部复制&lt;/font&gt;》，进入D界面，然后在D界面右击《&lt;font color=red&gt; 保存文件 &lt;/font&gt;》&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225384275.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225439915.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;9、然后保存为WeChatWin.dll，替换掉微信路径下原来的WeChatWin.dll文件&lt;br&gt;\n防撤回功能就完成了《&lt;font color=red&gt;实际使用上有撤回提示&lt;/font&gt;》。&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225459299.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;二-使用od制作pc微信多开功能\&#34;&gt;二、使用OD制作PC微信多开功能。&lt;/h2&gt;\n&lt;p&gt;前面的1-6的步骤同防撤回一样，就不再重复写了&lt;br&gt;\n&lt;font color=red&gt;第7步&lt;/font&gt;、得到如下图后，然后复制特征码：&lt;font color=red&gt;84C0740883CBFF&lt;/font&gt;&lt;br&gt;\n在《HEX +00》位置右击粘贴《确定》，&lt;br&gt;\n定位后选择&lt;font color=red&gt;定位下面的第一个JE&lt;/font&gt;《********   /74 08  je short WeChatWi.********》&lt;font color=red&gt;双击它&lt;/font&gt;，出现汇编窗口，&lt;font color=red&gt;修改JE为JMP&lt;/font&gt;&lt;br&gt;\n再点击《&lt;font color=red&gt;汇编&lt;/font&gt;》，然后点击《取消》退出汇编窗口。&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225735433.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225789004.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;第8、9步骤和防撤回一样，也不再重复了，&lt;br&gt;\n注：防撤回和多开可以一起处理好后一起保存好，这样就同时拥有2个功能了。&lt;br&gt;\n这边分两个是因为分开来讲解。&lt;br&gt;\n↓↓↓↓↓多开效果↓↓↓↓↓&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225817923.jpg\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;三、使用特征码制作PATCH补丁（无视微信版本一直可用，此方法不修改任何文件）&lt;br&gt;\n防撤回原始特征码：8B068BCEFF501885C00F8431FFFFFF&lt;br&gt;\n防撤回修改特征码：8B068BCEFF501885D00F8431FFFFFF（当前代码撤回无提示）&lt;br&gt;\n输入完成后点《添加》《生成补丁》保存名称：1.exe&lt;br&gt;\n使用方法：请先手动打开微信(任意界面均可)，然后等patch工具上显示“已运行”再点击工具上的patch按钮。&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225852129.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588225881151.gif\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;&lt;font color=red&gt;XH 补丁制作工具1.2.5下载（已更新）&lt;/font&gt;&lt;br&gt;\nhttps://www.lanzous.com/i778f3a   密码:87q1&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;2&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;&lt;font color=red&gt;&lt;strong&gt;这是我的第一篇内容&lt;/strong&gt;&lt;/font&gt;&lt;br&gt;\n本补丁只适用于微信电脑版&lt;/p&gt;\n&lt;p&gt;PC微信制作防撤回+多开教程《无视微信版本》【小白级步骤】&lt;br&gt;\n【本教程纯属小小小白级教程，无技术含量，大神勿喷，谢谢】&lt;br&gt;\n（对应防撤回特征码及补丁，以后更新微信版本当前特征码同样可用）&lt;br&gt;\n【2019年发布帖子   2020年4月更新成品补丁    以后本教程也同样有效】&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;【Windows】微信2.9.0.114防撤回多开-附学习笔记&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2020-04-30 13:28:40&#34;,&#34;dateFormat&#34;:&#34;2020-04-30&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/2/&#34;,&#34;hideInList&#34;:true,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;4 min read&#34;,&#34;time&#34;:191000,&#34;words&#34;:883,&#34;minutes&#34;:4},&#34;description&#34;:&#34;这是我的第一篇内容\n本补丁只适用于微信电脑版\nPC微信制作防撤回+多开教程《无视微信版本》【小白级步骤】\n【本教程纯属小小小白级教程，无技术含量，大神勿喷，谢谢】\n（对应防撤回特征码及补丁，以后更新微信版本当前特征码同样可用）\n【2019年...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BA%8C-%E4%BD%BF%E7%94%A8od%E5%88%B6%E4%BD%9Cpc%E5%BE%AE%E4%BF%A1%E5%A4%9A%E5%BC%80%E5%8A%9F%E8%83%BD\&#34;&gt;二、使用OD制作PC微信多开功能。&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;2020.4.30这是我第三次做网站了，前面每一次都因为各种原因不了了之了很是遗憾！&lt;br&gt;\n第一次因为服务器搬家导致无法恢复最后放弃&lt;br&gt;\n第二次因为没钱续费服务器直接烂尾&lt;br&gt;\n这一次我直接不要服务器了&lt;br&gt;\n使用&lt;strong&gt;GitHub&lt;/strong&gt;+&lt;strong&gt;gridea&lt;/strong&gt;建设又新一版的博客&lt;br&gt;\n特此纪念！！！&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;h1 id=\&#34;可以写博客的那劲儿又回来了\&#34;&gt;可以，写博客的那劲儿又回来了&lt;/h1&gt;\n&lt;h1 id=\&#34;markdown写作\&#34;&gt;&lt;strong&gt;Markdown&lt;/strong&gt;写作&lt;/h1&gt;\n&lt;p&gt;Markdown 是一种「标记语言」，通过简单的标记语法，使普通文本内容具有一定的格式。它最大的三个优点是：轻量、简单、通用，当前已经有很多人用它来写博客、写书甚至是写论文。&lt;/p&gt;\n&lt;p&gt;它主要的好处有：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;专注于文字而抛开烦人的排版&lt;/li&gt;\n&lt;li&gt;支持各种文本编辑器打开&lt;/li&gt;\n&lt;li&gt;轻松转换为html、PDF等格式&lt;/li&gt;\n&lt;li&gt;极好的可读性&lt;/li&gt;\n&lt;/ul&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://lxj5820.github.io/post-images/1588224244319.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;&lt;a href=\&#34;https://www.jianshu.com/p/a5387c159bd9\&#34;&gt;阅读原文-简书&lt;/a&gt;&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;1&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;2020.4.30这是我第三次做网站了，前面每一次都因为各种原因不了了之了很是遗憾！&lt;br&gt;\n第一次因为服务器搬家导致无法恢复最后放弃&lt;br&gt;\n第二次因为没钱续费服务器直接烂尾&lt;br&gt;\n这一次我直接不要服务器了&lt;br&gt;\n使用&lt;strong&gt;GitHub&lt;/strong&gt;+&lt;strong&gt;gridea&lt;/strong&gt;建设又新一版的博客&lt;br&gt;\n特此纪念！！！&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;又一次我开始做网站了&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;物理学圣剑&#34;,&#34;slug&#34;:&#34;7OSdsnEIr&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://lxj5820.github.io/tag/7OSdsnEIr/&#34;}],&#34;date&#34;:&#34;2020-04-30 08:49:12&#34;,&#34;dateFormat&#34;:&#34;2020-04-30&#34;,&#34;feature&#34;:&#34;https://lxj5820.github.io/post-images/1.jpg&#34;,&#34;link&#34;:&#34;https://lxj5820.github.io/post/1/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:48
